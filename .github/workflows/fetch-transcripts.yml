name: Fetch Channel Transcripts

# Why GitHub Actions and not Cloudflare Workers:
# YouTube silently blocks Cloudflare's Singapore datacenter IPs for watch page requests.
# GitHub Actions runs on GitHub/Azure IPs which serve different (less restricted) content.
# We use youtube-transcript-api which handles YouTube's anti-bot measures reliably.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID or @handle (leave empty to process all channels)'
        required: false
        default: ''
      limit:
        description: 'Max stubs to process per channel'
        required: false
        default: '500'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "youtube-transcript-api==0.6.2"

      - name: Fetch transcripts
        env:
          API_BASE: https://jolike.com
          BATCH_SECRET: ${{ secrets.CHANNEL_SYNC_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            ARGS="--channel ${{ github.event.inputs.channel }}"
          fi
          ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"

          python scripts/fetch-transcripts.py $ARGS
