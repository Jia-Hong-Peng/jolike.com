name: Fetch Channel Transcripts

# NOTE: This workflow has limited effectiveness — YouTube's bot-detection
# (PO Token requirement) blocks most transcript requests from Azure datacenter IPs.
# For bulk stub processing, run scripts/fetch-transcripts.py locally instead.
# This workflow is kept for auto-triggering when individual users hit RATE_LIMITED
# (triggered by analyze.js) and for occasional small-batch admin use.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID or @handle (leave empty to process all channels)'
        required: false
        default: ''
      limit:
        description: 'Max stubs to process per channel'
        required: false
        default: '500'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yt-dlp "youtube-transcript-api==0.6.2"

      - name: Setup YouTube cookies
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" | base64 -d > /tmp/yt-cookies.txt
            echo "YTDLP_COOKIES=/tmp/yt-cookies.txt" >> "$GITHUB_ENV"
            echo "Cookies loaded."
          else
            echo "No YOUTUBE_COOKIES secret set — proceeding without cookies."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Fetch transcripts
        env:
          API_BASE: https://jolike.com
          BATCH_SECRET: ${{ secrets.CHANNEL_SYNC_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            ARGS="--channel ${{ github.event.inputs.channel }}"
          fi
          ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          if [ -n "$YTDLP_COOKIES" ]; then
            ARGS="$ARGS --cookies $YTDLP_COOKIES"
          fi

          python scripts/fetch-transcripts.py $ARGS
